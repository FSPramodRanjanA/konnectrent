name: Release Build

# Manual trigger only — go to Actions tab → Release Build → Run workflow
on:
  workflow_dispatch:
    inputs:
      version_name:
        description: 'Version name (e.g. 1.2.0)'
        required: true
        default: '1.0.0'
      release_notes:
        description: 'Release notes for the GitHub Release'
        required: false
        default: 'New release'
      create_github_release:
        description: 'Create a GitHub Release after build?'
        required: true
        type: choice
        options:
          - 'yes'
          - 'no'
        default: 'yes'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  release-aab:
    name: Build & Sign Release AAB
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.x'
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze --no-fatal-infos

      - name: Run tests
        run: flutter test

      - name: Decode keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > android/app/release.jks

      - name: Create key.properties
        run: |
          cat > android/key.properties << EOF
          storeFile=release.jks
          storePassword=${{ secrets.KEYSTORE_PASSWORD }}
          keyAlias=${{ secrets.KEY_ALIAS }}
          keyPassword=${{ secrets.KEY_PASSWORD }}
          EOF

      - name: Build release AAB
        run: |
          flutter build appbundle --release \
            --dart-define=ADMOB_BANNER_ID=${{ secrets.ADMOB_BANNER_ID }} \
            --dart-define=ADMOB_INTERSTITIAL_ID=${{ secrets.ADMOB_INTERSTITIAL_ID }} \
            --dart-define=ADMOB_REWARDED_ID=${{ secrets.ADMOB_REWARDED_ID }} \
            --build-name=${{ inputs.version_name }} \
            --build-number=${{ github.run_number }}

      - name: Build release APK
        run: |
          flutter build apk --release \
            --dart-define=ADMOB_BANNER_ID=${{ secrets.ADMOB_BANNER_ID }} \
            --dart-define=ADMOB_INTERSTITIAL_ID=${{ secrets.ADMOB_INTERSTITIAL_ID }} \
            --dart-define=ADMOB_REWARDED_ID=${{ secrets.ADMOB_REWARDED_ID }} \
            --build-name=${{ inputs.version_name }} \
            --build-number=${{ github.run_number }}

      - name: Rename artifacts
        run: |
          mv build/app/outputs/bundle/release/app-release.aab \
             build/app/outputs/bundle/release/konnectrent-${{ inputs.version_name }}.aab
          mv build/app/outputs/apk/release/app-release.apk \
             build/app/outputs/apk/release/konnectrent-${{ inputs.version_name }}.apk

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: konnectrent-release-aab-${{ inputs.version_name }}
          path: build/app/outputs/bundle/release/konnectrent-${{ inputs.version_name }}.aab
          retention-days: 90

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: konnectrent-release-apk-${{ inputs.version_name }}
          path: build/app/outputs/apk/release/konnectrent-${{ inputs.version_name }}.apk
          retention-days: 90

      - name: Create GitHub Release
        if: inputs.create_github_release == 'yes'
        uses: softprops/action-gh-release@v2
        with:
          name: KonnectRent ${{ inputs.version_name }}
          tag_name: v${{ inputs.version_name }}
          draft: false
          prerelease: false
          files: |
            build/app/outputs/bundle/release/konnectrent-${{ inputs.version_name }}.aab
            build/app/outputs/apk/release/konnectrent-${{ inputs.version_name }}.apk
          body: |
            ## KonnectRent ${{ inputs.version_name }}

            ${{ inputs.release_notes }}

            ---
            **Build info**
            - Version: `${{ inputs.version_name }}`
            - Build number: `${{ github.run_number }}`
            - Commit: `${{ github.sha }}`
            - Branch: `${{ github.ref_name }}`

            **Install**
            - Play Store: upload the `.aab` to Google Play Console
            - Direct install: download `konnectrent-${{ inputs.version_name }}.apk`

      - name: Clean up keystore
        if: always()
        run: rm -f android/app/release.jks android/key.properties

      - name: Summary
        run: |
          echo "## ✅ Release Build Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Field | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| Version | \`${{ inputs.version_name }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Build # | \`${{ github.run_number }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| GitHub Release | ${{ inputs.create_github_release }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Commit | \`${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "📦 Download the AAB and APK from the **Artifacts** section above." >> $GITHUB_STEP_SUMMARY
