name: UAT Build

# Manual trigger only — go to Actions tab → UAT Build → Run workflow
on:
  workflow_dispatch:
    inputs:
      version_name:
        description: 'Version name (e.g. 1.0.0)'
        required: true
        default: '1.0.0'
      notes:
        description: 'Build notes (optional)'
        required: false
        default: ''

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  uat-apk:
    name: Build UAT APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.x'
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze --no-fatal-infos

      - name: Run tests
        run: flutter test

      - name: Build UAT APK (debug)
        run: |
          flutter build apk --debug \
            --dart-define=ADMOB_BANNER_ID=${{ secrets.ADMOB_BANNER_ID_TEST }} \
            --dart-define=ADMOB_INTERSTITIAL_ID=${{ secrets.ADMOB_INTERSTITIAL_ID_TEST }} \
            --dart-define=ADMOB_REWARDED_ID=${{ secrets.ADMOB_REWARDED_ID_TEST }} \
            --build-name=${{ inputs.version_name }} \
            --build-number=${{ github.run_number }}

      - name: Rename APK
        run: |
          mv build/app/outputs/flutter-apk/app-debug.apk \
             build/app/outputs/flutter-apk/konnectrent-uat-${{ inputs.version_name }}-${{ github.run_number }}.apk

      - name: Upload UAT APK
        uses: actions/upload-artifact@v4
        with:
          name: konnectrent-uat-${{ inputs.version_name }}-${{ github.run_number }}
          path: build/app/outputs/flutter-apk/konnectrent-uat-${{ inputs.version_name }}-${{ github.run_number }}.apk
          retention-days: 14

      - name: Summary
        run: |
          echo "## ✅ UAT Build Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Field | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| Version | \`${{ inputs.version_name }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Build # | \`${{ github.run_number }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Branch | \`${{ github.ref_name }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Commit | \`${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Notes | ${{ inputs.notes }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "📦 Download the APK from the **Artifacts** section above." >> $GITHUB_STEP_SUMMARY
